<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Hotel booking confirmation page</title>

  <link rel="stylesheet" href="style.css">

</head>
<body>

  <section class="sidebar">
    <section class="sidebar-1">
      <img src="./assets/images/logo.svg" alt="logo">
      <hr>
      <button><img src="./assets/images/icon-bed.svg" alt=""><span>Your stay</span></button>
      <button><img src="./assets/images/icon-house.svg" alt=""><span>The house</span></button>
      <button><img src="./assets/images/icon-pin.svg" alt=""><span>Around town</span></button>
      <button><img src="./assets/images/icon-breakfast-outline.svg" alt=""><span>Breakfast</span></button>
      <button><img src="./assets/images/icon-mail.svg" alt=""><span>Messages</span></button>
    </section>
    <section class="sidebar-2">
      <div class="weather-block">
        <span>Today in Cassis</span>
        <span class="temp">27°</span>
        <span>Sunny · light breeze</span>
      </div>
      <hr id="hr-dashed">
      <div class="footer">
        <p>Est. 1987</p>  
        <p>Maison Soleil · 12 Rue des Oliviers · Cassis</p>
        <p>© 2026 Maison Soleil</p>
      </div>
    </section>
  </section>

  <section class="main-window">
    <p>Booking · Confirmed</p>
    <header>
      <div>
      <span class="greetings">Bienvenue, <span class="username">Lucia.</span></span>
      </div>

      <div>
        <input type="button" value="Print receipt" class="print-receipt">
        <input type="button" value="Add to calendar" class="add-to-calendar">
      </div>
    </header>
  </section>



  
</body>
</html>
